<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Rammstein On Roblox</title>
  <link rel="icon" type="image/jpg" href="img/logo.jpg">
  <link rel="stylesheet" href="bootstrap/styles.css">
  <link rel="stylesheet" href="styles.css">
  <meta http-equiv="Content-Security-Policy" content="
      default-src 'self' https:;
      script-src 'self' https: 'unsafe-inline' 'unsafe-eval';
      style-src 'self' https: 'unsafe-inline';
      img-src 'self' https: data: blob:;
      connect-src 'self' https:;
  ">
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-light" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div class="header-container">
    <header class="custom-header">
        
        <div class="brand-block">
            <h1 class="desktop-logo">RAMMSTEIN ON ROBLOX</h1>
            
            <nav class="desktop-nav-container">
                <button class="pc-nav-link" onclick="showSection('about')">About Us</button>
                <button class="pc-nav-link" onclick="showSection('team')">Gallery</button>
                <button class="pc-nav-link" onclick="showSection('shop')">Shop</button>
            </nav>
        </div>

        <div class="mobile-logo-wrapper">
            <img src="img/1.png" alt="Menu" class="mobile-logo-btn" onclick="toggleMobileMenu()">
        </div>

        <div id="mobileSidebar" class="mobile-sidebar">
            <nav class="mobile-nav">
                <button class="mobile-nav-link" onclick="handleMobileNav('about')">About Us</button>
                <button class="mobile-nav-link" onclick="handleMobileNav('team')">Gallery</button>
                <button class="mobile-nav-link" onclick="handleMobileNav('shop')">Shop</button>
            </nav>
        </div>
        
    </header>
  </div>

  <main class="container my-5">
    <section id="about" class="section-content active">
      <h2 class="text-center mb-1">About Us</h2>
      <p class="text-center">
        <span id="aboutText" class="fade-in"></span>
      </p>
      <p class="text-center">
        <span id="aboutText2" class="fade-in"></span>
      </p>
    </section>

    <section id="team" class="section-content">
      <div class="row justify-content-center">
        <h2 class="text-center mb-4">Gallery</h2>
        
        <div class="col-md-3 mb-4">
          <div class="card shadow-sm photo-card" onclick="openPhotoModal(this)">
            <img src="img/Sonne Chorus After Intro.png" class="card-img-top gallery-img" alt="Sonne Chorus After Intro" 
                 data-info-where="Berlin, Olympiastadion" 
                 data-info-when="XX XX 2026">
          </div>
        </div>

        <div class="col-md-3 mb-4">
          <div class="card shadow-sm photo-card" onclick="openPhotoModal(this)">
            <img src="img/Sonne Drop.png" class="card-img-top gallery-img" alt="Sonne Drop" 
                 data-info-where="Berlin, Olympiastadion" 
                 data-info-when="XX XX 2026">
          </div>
        </div>
        
        <div class="col-md-3 mb-4">
          <div class="card shadow-sm photo-card" onclick="openPhotoModal(this)">
            <img src="img/Sonne Ending.png" class="card-img-top gallery-img" alt="Sonne Ending" 
                 data-info-where="Berlin, Olympiastadion" 
                 data-info-when="XX XX 2026">
          </div>
        </div>

        <div class="col-md-3 mb-4">
          <div class="card shadow-sm photo-card" onclick="openPhotoModal(this)">
            <img src="img/Sonne Verse 2.png" class="card-img-top gallery-img" alt="Sonne Verse 2" 
                 data-info-where="Berlin, Olympiastadion" 
                 data-info-when="XX XX 2026">
          </div>
        </div>
      </div>
    </section>

    <section id="social_media" class="section-content">
      <h2 class="text-center mb-4">Social Media</h2>
      <div class="text-center">
        <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 10px;">
          <img src="img/roblox-50.png" alt="Roblox" style="width: 24px; height: 24px; object-fit: contain;">
          <a href="https://www.roblox.com/communities/35005739" target="_blank">Roblox Community (Group)</a>
        </div>
        <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
          <img src="img/discord-50.png" alt="Discord" style="width: 24px; height: 24px; object-fit: contain;">
          <a href="https://discord.gg/NhYbxwaBAj" target="_blank">Discord Server</a>
        </div>
      </div>
    </section>
    
    <section id="shop" class="section-content">
      <h2 class="text-center mb-4">Apparel</h2>
      <div id="items-container" class="row justify-content-center"></div>
    </section>
  </main>

  <footer class="text-white text-center py-3" style="background-color: rgba(0, 0, 0, 0);">
    <p class="mb-0">&copy; 2025 Rammstein On Roblox. All Rights Reserved.</p>
  </footer>

  <div id="photoModal" class="photo-modal" onclick="closePhotoModal()">
    <span class="close-modal">&times;</span>
    <div class="modal-content-wrapper" onclick="event.stopPropagation()">
      <img id="modalImg" class="modal-img-content" src="" alt="">
      <div id="modalCaption" class="modal-caption">
        <p><strong>Where:</strong> <span id="infoWhere"></span></p>
        <p><strong>When:</strong> <span id="infoWhen"></span></p>
      </div>
    </div>
  </div>

  <script src="bootstrap/scripts.js"></script>
  <script src="script.js"></script>
</body>
</html>
